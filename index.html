<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生成績單 PDF 生成器 (預覽與合併版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background-color: #f5f6fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input[type="file"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        #previewBtn {
            background-color: #007bff;
            color: white;
        }
        #previewBtn:hover { background-color: #0056b3; }
        
        #downloadBtn {
            background-color: #28a745;
            color: white;
            display: none; /* 預設隱藏，預覽後才顯示 */
        }
        #downloadBtn:hover { background-color: #218838; }
        
        button:disabled {
            background-color: #cccccc !important;
            cursor: not-allowed;
        }
        #status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #2c3e50;
            white-space: pre-line;
        }

        /* 全螢幕載入遮罩 */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #2c3e50;
            font-weight: bold;
        }

        /* ==================== 預覽區塊樣式 ==================== */
        #preview-wrapper {
            display: none; /* 預設隱藏 */
            margin-top: 30px;
            background-color: #525659; /* 類似 PDF 閱讀器的深色背景 */
            padding: 30px 0;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        #pdf-render-area {
            width: 700px;
            margin: 0 auto;
        }
        
        /* 每一頁 A4 (內含兩名學生) */
        .pdf-page {
            width: 700px;
            background: white;
            box-sizing: border-box;
            margin-bottom: 20px; /* 預覽時的頁面間距 */
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); /* 預覽時的頁面陰影 */
        }
        
        /* 【核心】轉檔模式下的樣式調整 (消除陰影與間距，避免空白頁) */
        #pdf-render-area.export-mode .pdf-page {
            margin-bottom: 0 !important;
            box-shadow: none !important;
        }

        /* 強制在每一頁之後換頁，但最後一頁除外 */
        .pdf-page:not(:last-child) {
            page-break-after: always;
        }

        /* 個別學生的成績單區塊 */
        .report-card {
            height: 450px;
            padding: 30px 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* 中間裁切線 */
        .cut-line {
            border-top: 2px dashed #b2bec3;
            margin: 0;
            position: relative;
        }
        .cut-line::after {
            content: "✂️ 請沿虛線剪開 (每人一份)";
            position: absolute;
            top: -10px;
            left: 40px;
            background: white;
            padding: 0 10px;
            color: #636e72;
            font-size: 12px;
        }

        /* 內部文字與表格樣式 */
        .report-card h2 {
            text-align: center;
            margin: 0 0 5px 0;
            font-size: 24px;
            color: #2c3e50;
            letter-spacing: 1px;
        }
        .report-card h3 {
            text-align: center; 
            color: #7f8c8d; 
            margin: 0 0 10px 0;
            font-size: 16px;
        }
        .student-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
            border-bottom: 1px solid #dfe6e9;
            padding-bottom: 8px;
        }
        
        .score-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
            table-layout: fixed;
        }
        .score-table th, .score-table td {
            border: 1px solid #2c3e50;
            padding: 8px 4px;
            text-align: center;
            font-size: 13px;
            word-break: break-all;
        }
        .score-table th {
            background-color: #f8f9fa;
            color: #2c3e50;
            font-weight: bold;
        }
        .total-col {
            font-weight: bold;
            background-color: #f1f2f6;
            font-size: 14px !important;
        }
        .date-footer {
            margin-top: 15px;
            font-size: 12px;
            color: #95a5a6;
            text-align: right;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div>正在生成並打包 PDF...</div>
    <div style="font-size: 14px; margin-top: 10px; color: #7f8c8d;">(請勿關閉視窗，這可能需要幾秒鐘)</div>
</div>

<div class="container" id="main-ui">
    <h1>學生成績單 PDF 生成器</h1>
    <h3 style="text-align:center; font-size:14px; margin-top:-15px; color:#666;">(先預覽 · 後下載)</h3>
    <div class="controls">
        <label for="excelFile">請選擇包含成績的 Excel 或 CSV 檔案：</label>
        <input type="file" id="excelFile" accept=".xlsx, .xls, .csv">
        <div class="btn-group">
            <button id="previewBtn">1. 預覽版面</button>
            <button id="downloadBtn">2. 確認並下載 PDF</button>
        </div>
    </div>
    <div id="status"></div>
</div>

<div id="preview-wrapper">
    <div id="pdf-render-area"></div>
</div>

<script>
    // 產生單個學生成績單 HTML 結構的函式
    function createStudentCardHtml(student) {
        if (!student) return `<div class="report-card" style="visibility: hidden;"></div>`;

        const formatNum = (val) => {
            if(val === undefined || val === null || val === '') return '-';
            const num = parseFloat(val);
            return !isNaN(num) ? num.toFixed(2) : val;
        };

        const today = new Date().toLocaleDateString('zh-HK');
        const className = student['Class'] || '';
        const classNo = student['Class No.'] || student['Class No'] || '';
        const engName = student['Name'] || '';
        const chnName = student['中文姓名'] || '';

        return `
            <div class="report-card">
                <h2>學生成績表 Student Report Card</h2>
                <h3>3rd Term</h3>
                
                <div class="student-info">
                    <div><strong>班級 Class:</strong> ${className}</div>
                    <div><strong>學號 Class No.:</strong> ${classNo}</div>
                    <div><strong>姓名 Name:</strong> ${engName} ${chnName ? `(${chnName})` : ''}</div>
                </div>

                <table class="score-table">
                    <thead>
                        <tr>
                            <th style="width: 16%;">Unit Test 5</th>
                            <th style="width: 16%;">Class Quiz</th>
                            <th style="width: 18%;">Regular Scores</th>
                            <th style="width: 14%;">TSA</th>
                            <th style="width: 16%;">Exam</th>
                            <th style="width: 20%;" class="total-col">Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>${formatNum(student['Unit Test 5'])}</td>
                            <td>${formatNum(student['Class Quiz'])}</td>
                            <td>${formatNum(student['Regular Scores'])}</td>
                            <td>${formatNum(student['TSA'])}</td>
                            <td>${formatNum(student['Exam'])}</td>
                            <td class="total-col">${formatNum(student['Total'])}</td>
                        </tr>
                    </tbody>
                </table>
                <div class="date-footer">生成日期: ${today}</div>
            </div>
        `;
    }

    const fileInput = document.getElementById('excelFile');
    const previewBtn = document.getElementById('previewBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusDiv = document.getElementById('status');
    const renderArea = document.getElementById('pdf-render-area');
    const previewWrapper = document.getElementById('preview-wrapper');
    const overlay = document.getElementById('loading-overlay');
    
    let currentStudentCount = 0; // 記錄目前處理的學生人數

    // 步驟 1：讀取檔案並生成預覽
    previewBtn.addEventListener('click', () => {
        if (fileInput.files.length === 0) {
            alert('請先選擇一個成績檔案！');
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            try {
                statusDiv.innerText = '正在處理資料...';
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonArray = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                let headerRowIndex = -1;
                for (let i = 0; i < jsonArray.length; i++) {
                    const rowStr = JSON.stringify(jsonArray[i]).toLowerCase();
                    if (rowStr.includes('class') && rowStr.includes('name')) {
                        headerRowIndex = i;
                        break;
                    }
                }

                if (headerRowIndex === -1) {
                    alert('找不到標準表頭！請確認檔案欄位是否包含 Class 和 Name。');
                    statusDiv.innerText = '';
                    return;
                }

                const headers = jsonArray[headerRowIndex].map(h => typeof h === 'string' ? h.trim() : h);
                const validStudents = [];
                for (let i = headerRowIndex + 1; i < jsonArray.length; i++) {
                    const rowData = jsonArray[i];
                    if (!rowData || rowData.length === 0 || !rowData[0]) continue;

                    const student = {};
                    headers.forEach((header, index) => {
                        if (header) student[header] = rowData[index];
                    });
                    
                    if (student['Name']) validStudents.push(student);
                }

                if (validStudents.length === 0) {
                    alert('未在檔案中偵測到任何學生名單！');
                    return;
                }

                currentStudentCount = validStudents.length;

                // 建立 HTML 內容
                renderArea.innerHTML = ''; 
                for (let i = 0; i < validStudents.length; i += 2) {
                    const student1 = validStudents[i];
                    const student2 = validStudents[i + 1]; 

                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'pdf-page';
                    pageDiv.innerHTML = `
                        ${createStudentCardHtml(student1)}
                        ${student2 ? '<div class="cut-line"></div>' : ''}
                        ${createStudentCardHtml(student2)}
                    `;
                    renderArea.appendChild(pageDiv);
                }

                // 顯示預覽區與下載按鈕
                previewWrapper.style.display = 'block';
                downloadBtn.style.display = 'block';
                statusDiv.innerText = `✅ 預覽生成完畢！共偵測到 ${currentStudentCount} 位學生。\n請向下捲動檢查，確認無誤後點擊「確認並下載 PDF」。`;

                // 自動捲動到預覽區域
                previewWrapper.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                console.error(error);
                statusDiv.innerText = '讀取檔案發生錯誤，請檢查檔案格式。';
            }
        };

        reader.readAsArrayBuffer(file);
    });

    // 步驟 2：執行下載 PDF
    downloadBtn.addEventListener('click', () => {
        // 1. 顯示載入畫面，避免使用者亂按
        overlay.style.display = 'flex';
        
        // 2. 替渲染區加上 export-mode (移除預覽用的頁面間距和陰影，確保轉檔排版 100% 正確)
        renderArea.classList.add('export-mode');

        // 3. 給予瀏覽器 0.5 秒重新繪製無陰影的排版，隨後啟動轉檔
        setTimeout(async () => {
            try {
                const opt = {
                    margin: 0,
                    filename: '全體學生成績單_合併版.pdf',
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, logging: false },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: ['css'] }
                };

                await html2pdf().set(opt).from(renderArea).save();

                statusDiv.innerText = `🎉 成功！\n已將 ${currentStudentCount} 位學生的成績單下載為 PDF。`;
            } catch (err) {
                console.error(err);
                statusDiv.innerText = '生成 PDF 時發生錯誤。';
            } finally {
                // 轉檔結束，復原狀態
                renderArea.classList.remove('export-mode');
                overlay.style.display = 'none';
            }
        }, 500);
    });
</script>

</body>
</html>
